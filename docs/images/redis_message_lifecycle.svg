<svg width="680" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="580" fill="#ffffff"/>

  <!-- Producer -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#3C3489" x="340" y="52" text-anchor="middle" dominant-baseline="central">Producer calls push()</text>

  <line x1="340" y1="74" x2="340" y2="114" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pending list -->
  <rect x="220" y="114" width="240" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="340" y="130" text-anchor="middle" dominant-baseline="central">Pending list</text>
  <text font-size="12" fill="#0F6E56" x="340" y="148" text-anchor="middle" dominant-baseline="central">waiting for a worker</text>

  <line x1="340" y1="158" x2="340" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="352" y="180" dominant-baseline="central">poll()</text>

  <!-- Inflight -->
  <rect x="200" y="198" width="280" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13" x="340" y="218" text-anchor="middle" dominant-baseline="central">Inflight sorted set</text>
  <text font-size="12" fill="#993C1D" x="340" y="238" text-anchor="middle" dominant-baseline="central">worker processing · deadline ticking</text>

  <!-- Three exit arrows from inflight -->
  <line x1="220" y1="254" x2="130" y2="320" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="254" x2="340" y2="320" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="254" x2="560" y2="320" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <text font-size="12" fill="#1D9E75" x="155" y="292" text-anchor="middle" dominant-baseline="central">ack()</text>
  <text font-size="12" fill="#E24B4A" x="355" y="292" dominant-baseline="central">nack()</text>
  <text font-size="12" fill="#888780" x="524" y="292" dominant-baseline="central">crash</text>

  <!-- Done -->
  <rect x="50" y="320" width="180" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#27500A" x="140" y="340" text-anchor="middle" dominant-baseline="central">Done</text>
  <text font-size="12" fill="#3B6D11" x="140" y="360" text-anchor="middle" dominant-baseline="central">removed from inflight + retry hash</text>

  <!-- Retry check -->
  <rect x="240" y="320" width="200" height="56" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#791F1F" x="340" y="340" text-anchor="middle" dominant-baseline="central">Retry check</text>
  <text font-size="12" fill="#A32D2D" x="340" y="360" text-anchor="middle" dominant-baseline="central">retry_count vs max_retries</text>

  <!-- Reaper -->
  <rect x="480" y="320" width="160" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#444441" x="560" y="340" text-anchor="middle" dominant-baseline="central">Reaper</text>
  <text font-size="12" fill="#5F5E5A" x="560" y="360" text-anchor="middle" dominant-baseline="central">requeue_expired() runs</text>

  <!-- Retry check → back to pending or DLQ -->
  <line x1="300" y1="376" x2="220" y2="440" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="376" x2="460" y2="440" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text font-size="12" fill="#1D9E75" x="232" y="416" dominant-baseline="central">under limit</text>
  <text font-size="12" fill="#E24B4A" x="388" y="416" dominant-baseline="central">over limit</text>

  <!-- Reaper → back to pending -->
  <path d="M560 376 L560 462 L480 462" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Back to pending -->
  <rect x="110" y="440" width="200" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="210" y="462" text-anchor="middle" dominant-baseline="central">Back to pending list</text>

  <!-- DLQ -->
  <rect x="360" y="440" width="160" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="440" y="462" text-anchor="middle" dominant-baseline="central">Dead-letter queue</text>

  <!-- Footer -->
  <text font-size="11" fill="#888780" x="340" y="528" text-anchor="middle" dominant-baseline="central">green = success · red = failure · gray = crash recovery</text>
</svg>
