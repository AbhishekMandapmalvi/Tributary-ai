<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="820" fill="#ffffff"/>

  <!-- ── STAGE LABELS (right margin) ── -->
  <text font-size="11" fill="#888" x="648" y="100"  text-anchor="middle" dominant-baseline="central">Ingest</text>
  <text font-size="11" fill="#888" x="648" y="196"  text-anchor="middle" dominant-baseline="central">Queue 1</text>
  <text font-size="11" fill="#888" x="648" y="316"  text-anchor="middle" dominant-baseline="central">Extract</text>
  <text font-size="11" fill="#888" x="648" y="430"  text-anchor="middle" dominant-baseline="central">Queue 2</text>
  <text font-size="11" fill="#888" x="648" y="548"  text-anchor="middle" dominant-baseline="central">Embed</text>
  <text font-size="11" fill="#888" x="648" y="660"  text-anchor="middle" dominant-baseline="central">Store</text>

  <!-- stage separator lines -->
  <line x1="55" y1="148" x2="630" y2="148" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="55" y1="370" x2="630" y2="370" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>
  <line x1="55" y1="600" x2="630" y2="600" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ── PRODUCER ── -->
  <rect x="215" y="62" width="250" height="56" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#3C3489" x="340" y="83" text-anchor="middle" dominant-baseline="central">Producer</text>
  <text font-size="12" fill="#534AB7" x="340" y="104" text-anchor="middle" dominant-baseline="central">pushes doc references only (S3 key / path)</text>

  <!-- producer → doc queue -->
  <line x1="340" y1="118" x2="340" y2="162" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#888" x="352" y="142" dominant-baseline="central">push ref</text>

  <!-- ── DOCUMENT QUEUE ── -->
  <rect x="90" y="162" width="500" height="56" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="340" y="183" text-anchor="middle" dominant-baseline="central">Document queue  (Stage 1)</text>
  <text font-size="12" fill="#0F6E56" x="340" y="204" text-anchor="middle" dominant-baseline="central">tiny messages — just a doc reference + metadata</text>

  <!-- doc queue → extraction workers -->
  <line x1="175" y1="218" x2="155" y2="278" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="218" x2="340" y2="278" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="218" x2="525" y2="278" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#888" x="192" y="250" dominant-baseline="central">poll</text>
  <text font-size="11" fill="#888" x="352" y="250" dominant-baseline="central">poll</text>
  <text font-size="11" fill="#888" x="538" y="250" dominant-baseline="central">poll</text>

  <!-- CPU annotation -->
  <text font-size="11" fill="#888" x="340" y="268" text-anchor="middle" dominant-baseline="central">~3 workers  (CPU is the bottleneck)</text>

  <!-- ── EXTRACTION WORKERS ── -->
  <rect x="65" y="278" width="160" height="82" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13" x="145" y="302" text-anchor="middle" dominant-baseline="central">Extract worker 1</text>
  <text font-size="12" fill="#993C1D" x="145" y="322" text-anchor="middle" dominant-baseline="central">CPU-bound</text>
  <text font-size="12" fill="#993C1D" x="145" y="342" text-anchor="middle" dominant-baseline="central">extract → chunk</text>

  <rect x="260" y="278" width="160" height="82" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13" x="340" y="302" text-anchor="middle" dominant-baseline="central">Extract worker 2</text>
  <text font-size="12" fill="#993C1D" x="340" y="322" text-anchor="middle" dominant-baseline="central">CPU-bound</text>
  <text font-size="12" fill="#993C1D" x="340" y="342" text-anchor="middle" dominant-baseline="central">extract → chunk</text>

  <rect x="455" y="278" width="160" height="82" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13" x="535" y="302" text-anchor="middle" dominant-baseline="central">Extract worker 3</text>
  <text font-size="12" fill="#993C1D" x="535" y="322" text-anchor="middle" dominant-baseline="central">CPU-bound</text>
  <text font-size="12" fill="#993C1D" x="535" y="342" text-anchor="middle" dominant-baseline="central">extract → chunk</text>

  <!-- extraction workers → chunk queue -->
  <line x1="145" y1="360" x2="175" y2="412" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="360" x2="340" y2="412" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="535" y1="360" x2="505" y2="412" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#888" x="90" y="388" dominant-baseline="central">push chunks</text>

  <!-- ── CHUNK QUEUE ── -->
  <rect x="90" y="412" width="500" height="56" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="340" y="433" text-anchor="middle" dominant-baseline="central">Chunk queue  (Stage 2)</text>
  <text font-size="12" fill="#0F6E56" x="340" y="454" text-anchor="middle" dominant-baseline="central">chunk text + doc id + chunk index + overlap context</text>

  <!-- chunk queue → embedding workers -->
  <line x1="155" y1="468" x2="120" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="255" y1="468" x2="245" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="468" x2="340" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="468" x2="435" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="525" y1="468" x2="550" y2="510" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- I/O annotation -->
  <text font-size="11" fill="#888" x="340" y="500" text-anchor="middle" dominant-baseline="central">~20 workers  (I/O is the bottleneck — waiting on API)</text>

  <!-- ── EMBEDDING WORKERS ── -->
  <rect x="65"  y="510" width="100" height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="115" y="534" text-anchor="middle" dominant-baseline="central">Embed 1</text>
  <text font-size="12" fill="#185FA5" x="115" y="554" text-anchor="middle" dominant-baseline="central">I/O-bound</text>
  <text font-size="12" fill="#185FA5" x="115" y="572" text-anchor="middle" dominant-baseline="central">→ store</text>

  <rect x="190" y="510" width="100" height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="240" y="534" text-anchor="middle" dominant-baseline="central">Embed 2</text>
  <text font-size="12" fill="#185FA5" x="240" y="554" text-anchor="middle" dominant-baseline="central">I/O-bound</text>
  <text font-size="12" fill="#185FA5" x="240" y="572" text-anchor="middle" dominant-baseline="central">→ store</text>

  <rect x="315" y="510" width="100" height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="365" y="534" text-anchor="middle" dominant-baseline="central">Embed 3</text>
  <text font-size="12" fill="#185FA5" x="365" y="554" text-anchor="middle" dominant-baseline="central">I/O-bound</text>
  <text font-size="12" fill="#185FA5" x="365" y="572" text-anchor="middle" dominant-baseline="central">→ store</text>

  <rect x="422" y="510" width="45"  height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="12" fill="#185FA5" x="445" y="550" text-anchor="middle" dominant-baseline="central">···</text>

  <rect x="500" y="510" width="100" height="72" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#0C447C" x="550" y="534" text-anchor="middle" dominant-baseline="central">Embed N</text>
  <text font-size="12" fill="#185FA5" x="550" y="554" text-anchor="middle" dominant-baseline="central">I/O-bound</text>
  <text font-size="12" fill="#185FA5" x="550" y="572" text-anchor="middle" dominant-baseline="central">→ store</text>

  <!-- embedding workers → vector DB -->
  <line x1="115" y1="582" x2="230" y2="628" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="582" x2="290" y2="628" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="365" y1="582" x2="340" y2="628" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="582" x2="470" y2="628" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── VECTOR DB ── -->
  <rect x="175" y="628" width="330" height="56" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#27500A" x="340" y="649" text-anchor="middle" dominant-baseline="central">Vector DB</text>
  <text font-size="12" fill="#3B6D11" x="340" y="670" text-anchor="middle" dominant-baseline="central">Pinecone · OpenSearch · Weaviate</text>

  <!-- ── DLQ (left side) ── -->
  <path d="M65 320 L42 320 L42 762 L65 762" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-size="11" fill="#E24B4A" x="34" y="540" text-anchor="middle" dominant-baseline="central" transform="rotate(-90,34,540)">nack × N → DLQ</text>

  <rect x="65" y="748" width="220" height="44" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="175" y="766" text-anchor="middle" dominant-baseline="central">Dead-letter queue</text>
  <text font-size="12" fill="#854F0B" x="175" y="783" text-anchor="middle" dominant-baseline="central">one DLQ per stage</text>
</svg>
