[project]
name = "tributary"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "AbhishekMandapmalvi", email = "abhishekrmandapmalvi@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "lxml>=6.0.2",
    "markdown-it-py>=4.0.0",
    "mdit-plain>=1.0.1",
    "pymupdf>=1.27.2.2",
    "structlog>=25.5.0",
]

[project.scripts]
tributary = "tributary:main"

[build-system]
requires = ["uv_build>=0.11.3,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "aiohttp>=3.13.5",
    "certifi>=2026.2.25",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "requests>=2.33.1",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
