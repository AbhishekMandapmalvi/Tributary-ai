name: Release

# Runs only on push to master (i.e., after a PR merges).
# Pipeline:
#   1. Test on master HEAD (safety re-run after squash-merge)
#   2. Analyze commits since last tag → decide next version
#   3. Bump pyproject.toml + src/tributary/__init__.py, update CHANGELOG.md,
#      commit, tag, push
#   4. Build wheel/sdist with `uv build`
#   5. Publish to PyPI via trusted publisher
#   6. Create a GitHub Release from the new tag with changelog excerpt
#
# semantic-release is installed into the host runner (not used as a Docker
# action) so it can see tags fetched by actions/checkout and invoke `uv`
# for the build command.
on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Download NLTK data
        run: uv run python -c "import nltk; nltk.download('punkt_tab')"

      - name: Run tests
        run: uv run pytest -v

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi

    permissions:
      contents: write      # Push version bump commit + tag
      id-token: write      # PyPI trusted publishing
      pull-requests: read  # Read PR labels for version overrides

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install python-semantic-release
        run: uv tool install "python-semantic-release>=9.0"

      - name: Verify tags are visible
        run: |
          echo "Tags fetched:"
          git tag -l
          echo ""
          echo "Most recent tag:"
          git describe --tags --abbrev=0 || echo "no tags"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release version
        id: semrel
        run: |
          # Capture the current version before running
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

          # Run version bump + changelog + commit + tag + push
          # --no-vcs-release so we control the PyPI upload step ourselves
          uv tool run --from python-semantic-release semantic-release \
            version \
            --push \
            --no-vcs-release
          echo "exit=$?" >> "$GITHUB_OUTPUT"

          # Did semantic-release actually create a new tag?
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          if [ "$NEW_TAG" != "$CURRENT_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "Released: $NEW_TAG"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No release warranted (no version bump from semantic-release)."
          fi

      - name: Publish to PyPI
        if: steps.semrel.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.semrel.outputs.new_tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-from-tag \
            dist/*
